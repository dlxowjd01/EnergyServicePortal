version: 2
jobs:
  build:

    working_directory: ~/circleci-demo-java-spring

    docker:
      - image: circleci/openjdk:8u171-jdk-stretch-browsers

    environment:
      # Customize the JVM maximum heap limit
      MAVEN_OPTS: -Xmx3200m

    steps:

      # Step 1: obtain repo from GitHub
      - checkout

      - restore_cache:
          key: circleci-demo-java-spring-{{ checksum "ewpsp/pom.xml" }}-{{ checksum "ewp-api-agent/pom.xml" }}

      - run: mvn -f ewpsp/pom.xml dependency:go-offline

      - run: mvn -f ewp-api-agent/pom.xml dependency:go-offline

      - save_cache:
          paths:
            - ~/.m2
          key: circleci-demo-java-spring-{{ checksum "ewpsp/pom.xml" }}-{{ checksum "ewp-api-agent/pom.xml" }}

      # run tests!
      #- run: mvn integration-test
      - run:
          name: static code analysis
          command: |
            mv settings.xml ~/.m2/settings.xml
            mvn -f ewpsp/pom.xml clean package sonar:sonar
            mvn -f ewp-api-agent/pom.xml clean package sonar:sonar

      - run: mvn -f ewpsp/pom.xml package clean package -DskipTests=true

      - run: mvn -f ewp-api-agent/pom.xml clean package -DskipTests=true

      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: Build and push SP Docker image (war)
          command: |
            cp ewpsp/target/ewpsp.war .
            DOCKERHUB_REPO=enertalk/ewp
            IMAGE_TAG=ewpsp-$CIRCLE_SHA1
            IMAGE_DEFAULT_TAG=ewpsp-latest
            IMAGE_NAME=$DOCKERHUB_REPO:$IMAGE_TAG
            IMAGE_DEFAULT_NAME=$DOCKERHUB_REPO:$IMAGE_DEFAULT_TAG
            docker build -t $IMAGE_NAME -t $IMAGE_DEFAULT_NAME -f ~/circleci-demo-java-spring/docker/ewpsp/Dockerfile .
            docker login -u $DOCKER_LOGIN -p $DOCKER_PWD
            docker push $IMAGE_NAME
            docker push $IMAGE_DEFAULT_NAME

      - run:
          name: Build and push SP Docker image (jar)
          command: |
            cp ewp-api-agent/target/ewp-api-0.0.1-SNAPSHOT.jar .
            DOCKERHUB_REPO=enertalk/ewp
            IMAGE_TAG=ewp-api-$CIRCLE_SHA1
            IMAGE_DEFAULT_TAG=ewp-api-latest
            IMAGE_NAME=$DOCKERHUB_REPO:$IMAGE_TAG
            IMAGE_DEFAULT_NAME=$DOCKERHUB_REPO:$IMAGE_DEFAULT_TAG
            docker build -t $IMAGE_NAME -t $IMAGE_DEFAULT_NAME -f ~/circleci-demo-java-spring/docker/ewp-api/Dockerfile .
            docker login -u $DOCKER_LOGIN -p $DOCKER_PWD
            docker push $IMAGE_NAME
            docker push $IMAGE_DEFAULT_NAME

      - store_artifacts:
          path: ewpsp/target/ewpsp.war

      - store_artifacts:
          path: ewp-api-agent/target/ewp-api-0.0.1-SNAPSHOT.jar

      - store_artifacts:
          path: scripts/deploy.sh

      - store_artifacts:
          path: scripts/health-check.sh

      - store_artifacts:
          path: sitespeed.io/login.js

      - persist_to_workspace:
          root: ~/circleci-demo-java-spring
          paths:
            - ewpsp.war
            - ewp-api-0.0.1-SNAPSHOT.jar
            - scripts/deploy.sh
            - scripts/health-check.sh
            - sitespeed.io/login.js

  deploy:
    docker:
      - image: circleci/openjdk:8u171-jdk-stretch-browsers
    steps:
      - attach_workspace: 
          at: ~/circleci-demo-java-spring
      - run: 
          name: Generate ssh key
          command: |
            mkdir ~/.ssh
            echo -e $SSH_PRIVATE_KEY > ~/.ssh/ewp.pem
            chmod 600 ~/.ssh/ewp.pem
      - run: 
          name: Build and push SP Docker image (jar)
          command: |
            REMOTE_SERVER=$SSH_USER@$SSH_HOST
            scp -i ~/.ssh/ewp.pem -o StrictHostKeyChecking=no ~/circleci-demo-java-spring/ewpsp.war $REMOTE_SERVER:/home/ubuntu/build
            scp -i ~/.ssh/ewp.pem -o StrictHostKeyChecking=no ~/circleci-demo-java-spring/ewp-api-0.0.1-SNAPSHOT.jar $REMOTE_SERVER:/home/ubuntu/build
            scp -i ~/.ssh/ewp.pem -o StrictHostKeyChecking=no ~/circleci-demo-java-spring/scripts/*.sh $SSH_USER@$SSH_HOST:/home/ubuntu/
            ssh -i ~/.ssh/ewp.pem -o StrictHostKeyChecking=no $REMOTE_SERVER 'chmod 755 ./deploy.sh; ./deploy.sh; chmod 755 ./health-check.sh; ./health-check.sh'

  test-sitespeed:
    machine: true
    steps:
      - attach_workspace: 
          at: ~/circleci-demo-java-spring
      - checkout
      - run: sudo modprobe ifb numifbs=1
      - run: docker run --rm -v ~/circleci-demo-java-spring/sitespeed.io:/sitespeed.io sitespeedio/sitespeed.io:8.14.0 --preScript /sitespeed.io/login.js http://localhost:8080/main
      - store_artifacts:
          path: sitespeed-results/

  publish-github-release:
    docker:
      - image: cibuilds/github:0.10
    steps:
      - attach_workspace: 
          at: ~/circleci-demo-java-spring
      - run:
          name: "Publish Release on GitHub"
          command: |
            VERSION=1.0.6
            ghr -t ${GITHUB_TOKEN} -u ${CIRCLE_PROJECT_USERNAME} -r ${CIRCLE_PROJECT_REPONAME} -c ${CIRCLE_SHA1} -delete ${VERSION} /root/circleci-demo-java-spring

workflows:
  version: 2
  main:
    jobs:
      - build:
          filters:
            branches:
              ignore: develop
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: master
      - test-sitespeed:
          requires:
            - deploy
      - publish-github-release:
          requires:
            - build
          filters:
            branches:
              only: master
